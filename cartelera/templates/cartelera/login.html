<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Cinehub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>

<body>
    <header class="main-header">
        <div class="container">
            <h1 class="logo-text">
                <a href="{% url 'cartelera' %}">
                    <img src="{% static 'images/cinehub_logo.png' %}" alt="DTC GANG Logo" class="header-logo">
                </a>
            </h1>
            <nav class="main-nav">
                <ul style="align-items: center;">
                    <li><a href="{% url 'cartelera' %}">Inicio</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="login-container">
            <h2 class="section-title" style="text-align: center; font-size: 24px;">Bienvenido</h2>
            
            {% if error %}
            <div class="error-msg">❌ {{ error }}</div>
            {% endif %}

            {% load socialaccount %}
            <a href="{% provider_login_url 'google' %}" class="btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
                Iniciar sesión con Google
            </a>

            <div class="separator">O ingresa como empleado</div>

            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" name="correo" class="form-control" placeholder="ej. admin@cine.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">Entrar</button>
            </form>
            
            <p style="margin-top:25px; font-size:13px; color:#888;">*El inicio manual es exclusivo de Administradores*</p>
        </div>
    </main>
</body>
</html>
